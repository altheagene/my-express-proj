<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">    
    <title>Static File</title>
</head>
<body class="bg-gray-50">
    <div class="flex flex-col max-w-[450px] w-full gap-[1rem] mx-auto my-[2rem]">
        <h1>Hello from a static file!</h1>
        <h2 class="font-semibold text-3xl">My List</h2>
        <form id="item-form" class="flex w-full gap-[1rem]">
            <input class="h-[45px] w-[80%] border border-gray-300 rounded-lg px-4" 
                    type="text" 
                    id="item-input" 
                    placeholder="Add an item" required>
            <button 
                type="submit" 
                class="bg-black h-[45px] w-[20%] border border-gray-300 rounded-lg text-white">
                + Add
            </button>
        </form>
        <ul id="item-list" class="flex flex-col gap-[1rem] w-full"></ul>
    </div>
    
    <script>
        const form = document.getElementById('item-form');
        const input = document.getElementById('item-input');
        const list = document.getElementById('item-list');

        form.addEventListener('submit', async(e) => {
            e.preventDefault();
            const item = input.value.trim();

            if(item){
                await fetch('/items', {
                    method: 'POST',
                    headers: {
                        'Content-Type' : 'application/json'
                    },
                    body: JSON.stringify({item})
                });
                input.value = '';
                loadItems();
                input.focus();
            }
        })

        function deleteItem(index){

            const confirmation = confirm('Are you sure you want to delete this item?');

            if(!confirmation) return;

            fetch(`/items/${index}`, {
                method: 'DELETE'
            }).then(() => loadItems());
        }

        function editItem(index){

            const newItem = prompt('Enter new value').trim();
            if(newItem === ''){
                alert('Item cannot be empty');
                return;
            }

            fetch(`/items/${index}`, {
                method: 'PUT',
                headers: {
                    'Content-Type' : 'application/json'
                },
                body: JSON.stringify({item: prompt('Enter new value').trim()})
            }).then(() => loadItems());
        }

        async function loadItems(){
            const response = await fetch('/items');
            const items = await response.json();
            list.innerHTML = items.map((item, index) => `
                <li class="flex justify-between items-center border border-gray-300 p-2 rounded-lg hover:bg-gray-100 bg-white">
                    ${item}
                    <span>
                    <button onclick="deleteItem(${index})" class="bi bi-trash border-2 border-red-500 text-red-500 px-2 py-1 rounded hover:text-white hover:bg-red-500"></button>
                    <button onclick="editItem(${index})" class="bi bi-pencil border-2 border-blue-500 text-blue-500 px-2 py-1 rounded hover:text-white hover:bg-blue-500"></button>
                    </span>
                </li>`).join('');
        }

        loadItems();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
